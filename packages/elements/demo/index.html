<!doctype html>
<!--
  @gemina/elements manual demo.

  Build the bundle (one line, from packages/elements/):

    npx esbuild demo/demo.tsx --bundle --outfile=demo/demo.js --jsx=automatic \
      --define:process.env.NODE_ENV='"production"'

  Then serve this folder (any static server):

    npx serve demo

  Paste a session token into the page (simulating what YOUR backend would
  mint via POST /v1/sessions/token). To get one for testing, run this
  SERVER-SIDE (never put the API key in a browser or in this page):

    curl -s -X POST "https://api.gemina.co/api/v1/sessions/token" \
      -H "X-API-Key: $GEMINA_API_KEY" \
      -H "Content-Type: application/json" \
      -d '{"ttlSeconds": 900}'

  Copy the "token" value from the response. Tokens expire after <= 15
  minutes — mint a fresh one and re-mount when it does.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@gemina/elements demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
      input, textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; }
      button { margin-top: 0.75rem; padding: 0.5rem 1.25rem; }
      #chat-slot { margin-top: 1.5rem; }
      .hint { color: #667085; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>@gemina/elements demo</h1>
    <p class="hint">
      Paste a session token minted by a backend (see the comment in this
      file's source). The Gemina API key must never appear here.
    </p>
    <div id="root"></div>
    <script src="./demo.js"></script>
  </body>
</html>
