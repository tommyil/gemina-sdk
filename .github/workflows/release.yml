# Release: tag vX.Y.Z → verify versions match the tag → build everything →
# publish each registry IFF its credential secret exists (loud skip
# otherwise). Each release records the frozen spec snapshot it was built from.
#
# Registry secrets (see docs/PUBLISHING-SETUP.md):
#   NPM_TOKEN, PYPI_TOKEN, NUGET_API_KEY,
#   MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
#   MAVEN_GPG_PRIVATE_KEY, MAVEN_GPG_PASSPHRASE,
#   SDK_PHP_MIRROR_SSH_KEY (private half of a write deploy key on the
#   gemina-sdk-php read-only mirror; Packagist auto-updates from that
#   repo's webhook).
name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  verify:
    name: Tag matches package versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      spec: ${{ steps.v.outputs.spec }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "spec=$(cat specs/CURRENT)" >> "$GITHUB_OUTPUT"
          fail=0
          check() { grep -q "$2" "$1" || { echo "::error file=$1::expected $2"; fail=1; }; }
          check sdks/typescript/package.json "\"version\": \"$VERSION\""
          check sdks/python/pyproject.toml "version = \"$VERSION\""
          check sdks/csharp/src/Gemina.Sdk/Gemina.Sdk.csproj "<Version>$VERSION</Version>"
          check sdks/java/pom.xml "<version>$VERSION</version>"
          check packages/elements/package.json "\"version\": \"$VERSION\""
          grep -Eq "VERSION = ['\"]$VERSION['\"]" sdks/typescript/src/version.ts || fail=1
          grep -Eq "VERSION = ['\"]$VERSION['\"]" packages/elements/src/version.ts || fail=1
          exit $fail

  npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check credential
        id: cred
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then echo "have=true" >> "$GITHUB_OUTPUT";
          else echo "::warning title=npm publish SKIPPED::NPM_TOKEN secret is not configured"; fi
      - uses: actions/setup-node@v4
        if: steps.cred.outputs.have == 'true'
        with: { node-version: 22, registry-url: "https://registry.npmjs.org" }
      - name: Publish @gemina/sdk
        if: steps.cred.outputs.have == 'true'
        working-directory: sdks/typescript
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: |
          npm ci && npm run build && npm test
          npm publish --access public

  npm-elements:
    # After the SDK so registry state is consistent; the lockfile pins the
    # @gemina/sdk version npm ci installs, so the build never races the
    # freshly-published SDK version.
    needs: [verify, npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check credential
        id: cred
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then echo "have=true" >> "$GITHUB_OUTPUT";
          else echo "::warning title=npm elements publish SKIPPED::NPM_TOKEN secret is not configured"; fi
      - uses: actions/setup-node@v4
        if: steps.cred.outputs.have == 'true'
        with: { node-version: 22, registry-url: "https://registry.npmjs.org" }
      - name: Publish @gemina/elements
        if: steps.cred.outputs.have == 'true'
        working-directory: packages/elements
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: |
          npm ci && npm run build && npm test
          npm publish --access public

  pypi:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check credential
        id: cred
        run: |
          if [ -n "${{ secrets.PYPI_TOKEN }}" ]; then echo "have=true" >> "$GITHUB_OUTPUT";
          else echo "::warning title=PyPI publish SKIPPED::PYPI_TOKEN secret is not configured"; fi
      - uses: actions/setup-python@v5
        if: steps.cred.outputs.have == 'true'
        with: { python-version: "3.12" }
      - name: Publish gemina
        if: steps.cred.outputs.have == 'true'
        working-directory: sdks/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install -e ".[dev]" build twine && pytest -q
          python -m build
          twine upload dist/*

  nuget:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check credential
        id: cred
        run: |
          if [ -n "${{ secrets.NUGET_API_KEY }}" ]; then echo "have=true" >> "$GITHUB_OUTPUT";
          else echo "::warning title=NuGet publish SKIPPED::NUGET_API_KEY secret is not configured"; fi
      - uses: actions/setup-dotnet@v4
        if: steps.cred.outputs.have == 'true'
        with: { dotnet-version: "8.0.x" }
      - name: Publish Gemina.Sdk
        if: steps.cred.outputs.have == 'true'
        working-directory: sdks/csharp
        run: |
          dotnet build Gemina.Sdk.sln -c Release && dotnet test -c Release --no-build
          dotnet pack src/Gemina.Sdk -c Release -o out
          dotnet nuget push "out/*.nupkg" -k "${{ secrets.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate

  maven-central:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check credentials
        id: cred
        run: |
          if [ -n "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ] && [ -n "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" ]; then echo "have=true" >> "$GITHUB_OUTPUT";
          else echo "::warning title=Maven Central publish SKIPPED::MAVEN_CENTRAL_* / MAVEN_GPG_* secrets are not configured"; fi
      - uses: actions/setup-java@v4
        if: steps.cred.outputs.have == 'true'
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Publish co.gemina:gemina-sdk
        if: steps.cred.outputs.have == 'true'
        working-directory: sdks/java
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -P release deploy

  packagist-mirror:
    # Packagist can't index a monorepo subdirectory: push a read-only subtree
    # split of sdks/php to tommyil/gemina-sdk-php; Packagist tracks that repo.
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check credential
        id: cred
        run: |
          if [ -n "${{ secrets.SDK_PHP_MIRROR_SSH_KEY }}" ]; then echo "have=true" >> "$GITHUB_OUTPUT";
          else echo "::warning title=Packagist mirror push SKIPPED::SDK_PHP_MIRROR_SSH_KEY secret is not configured"; fi
      - name: Push subtree split + tag
        if: steps.cred.outputs.have == 'true'
        env:
          MIRROR_SSH_KEY: ${{ secrets.SDK_PHP_MIRROR_SSH_KEY }}
        run: |
          # Deploy-key auth: the key is write-scoped to gemina-sdk-php ONLY
          # (narrower than any PAT). Public half lives on that repo's deploy keys.
          mkdir -p ~/.ssh
          printf '%s\n' "$MIRROR_SSH_KEY" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes"
          git config user.name "gemina-sdk-release"
          git config user.email "support@gemina.co"
          SPLIT=$(git subtree split --prefix=sdks/php HEAD)
          git push git@github.com:tommyil/gemina-sdk-php.git "$SPLIT:refs/heads/main" -f
          git push git@github.com:tommyil/gemina-sdk-php.git "$SPLIT:refs/tags/${GITHUB_REF_NAME}" -f

  github-release:
    needs: [verify, npm, npm-elements, pypi, nuget, maven-central, packagist-mirror]
    if: always() && needs.verify.result == 'success'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release with spec provenance
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Gemina SDKs $GITHUB_REF_NAME" \
            --notes "Built from frozen spec snapshot: \`${{ needs.verify.outputs.spec }}\`

          Registry publish results: npm=${{ needs.npm.result }} elements=${{ needs.npm-elements.result }} pypi=${{ needs.pypi.result }} nuget=${{ needs.nuget.result }} maven=${{ needs.maven-central.result }} packagist-mirror=${{ needs.packagist-mirror.result }} (success with a missing secret = loud skip; check job warnings)." \
            specs/${{ needs.verify.outputs.spec }}
